<?xml version="1.0" encoding="UTF-8"?>
<!-- Alorex Packaging LLP — Primary Logo (Light Background / Print) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 62" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&amp;display=swap');</style>
    <linearGradient id="bg" x1="2" y1="2" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8673A"/>
      <stop offset="0.6" stop-color="#C97B28"/>
      <stop offset="1" stop-color="#C8940A"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="264" height="62" fill="white"/>

  <!-- Badge: rounded square -->
  <rect x="2" y="2" width="58" height="58" rx="13" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="51" height="51" rx="10.5" stroke="rgba(255,255,255,0.22)" stroke-width="1" fill="none"/>

  <!-- AP Monogram -->
  <text x="31" y="40"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="900" fill="white"
    text-anchor="middle" letter-spacing="2">AP</text>
  <rect x="16" y="44" width="30" height="1.5" rx="0.75" fill="rgba(255,255,255,0.35)"/>

  <!-- Wordmark -->
  <text x="74" y="24"
    font-family="Cinzel, Georgia, 'Times New Roman', serif"
    font-size="21" font-weight="700" fill="#1C2840" letter-spacing="7">ALOREX</text>
  <rect x="74" y="30" width="170" height="1" rx="0.5" fill="#C8673A" opacity="0.55"/>
  <text x="74" y="42"
    font-family="Cinzel, Georgia, 'Times New Roman', serif"
    font-size="9.5" font-weight="400" fill="#C8673A" letter-spacing="4.5">PACKAGING LLP</text>
  <text x="74" y="55"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7.5" fill="rgba(28,40,64,0.32)" letter-spacing="1.3"
    font-style="italic">Premium Non Woven Bags · India</text>
</svg>
